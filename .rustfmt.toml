# SPDX-License-Identifier: GPL-2.0
# linuxab .rustfmt.toml - Linux Kernel Rust Coding Style

# ============================================
# Edition
# ============================================
edition = "2021"

# ============================================
# Indentation: 4 spaces (NOT tabs, unlike C)
# ============================================
hard_tabs = false
tab_spaces = 4
indent_style = "Block"

# ============================================
# Width: 100 columns (modern kernel Rust)
# ============================================
max_width = 100

# Don't break short expressions unnecessarily
use_small_heuristics = "Max"
fn_call_width = 100
attr_fn_like_width = 100
struct_lit_width = 36
struct_variant_width = 50
array_width = 80
chain_width = 80
single_line_if_else_max_width = 50
single_line_let_else_max_width = 50

# ============================================
# Line endings
# ============================================
newline_style = "Unix"

# ============================================
# Comments and docs
# ============================================
wrap_comments = true
comment_width = 100
format_code_in_doc_comments = true
format_strings = true
normalize_doc_attributes = true

# ============================================
# Macros
# ============================================
format_macro_matchers = true
format_macro_bodies = true

# ============================================
# Imports
# ============================================
imports_granularity = "Module"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true

# ============================================
# Matching and control flow
# ============================================
match_arm_leading_pipes = "Never"
match_block_trailing_comma = true
combine_control_expr = true
force_multiline_blocks = false
empty_item_single_line = false

# ============================================
# Trailing punctuation
# ============================================
trailing_comma = "Vertical"
trailing_semicolon = true

# ============================================
# Types and literals
# ============================================
type_punctuation_density = "Wide"
hex_literal_case = "Lower"
use_field_init_shorthand = true
use_try_shorthand = true
condense_wildcard_suffixes = true
remove_nested_parens = true

# ============================================
# Alignment
# ============================================
enum_discrim_align_threshold = 0
force_explicit_abi = true

# ============================================
# Spacing
# ============================================
space_after_colon = true
space_before_colon = false
spaces_around_ranges = false

# ============================================
# Brace style (Rust standard: same line)
# ============================================
brace_style = "SameLineWhere"
control_brace_style = "AlwaysSameLine"
where_single_line = false

# ============================================
# Skip generated / vendored files
# ============================================
ignore = [
    "target/",
    "build/",
    "out/",
    "tools/",
    "scripts/",
    "include/generated/",
    "*.generated.rs",
    "*.gen.rs",
]

# ============================================
# License template enforcement (optional)
# Uncomment after creating rust-license-template.txt
# ============================================
# license_template_path = "rust-license-template.txt"