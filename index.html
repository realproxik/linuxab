function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function buildTree() {
  const root = {};
  files.forEach(f => {
    const parts = f.path.split('/');
    let curr = root;
    parts.forEach((part, idx) => {
      if (!curr[part]) curr[part] = idx === parts.length - 1 ? { __file: f } : {};
      curr = curr[part];
    });
  });
  return root;
}

function renderTree(node, container, pathPrefix, depth) {
  const dirs = Object.keys(node).filter(k => k !== '__file').sort((a,b) => a.localeCompare(b));
  const ul = document.createElement('ul');

  dirs.forEach(name => {
    const child = node[name];
    const isFile = child.__file;
    const fullPath = pathPrefix ? pathPrefix + '/' + name : name;
    const li = document.createElement('li');

    if (isFile) {
      const f = child.__file;
      li.dataset.path = f.path.toLowerCase();
      li.dataset.name = name.toLowerCase();
      li.innerHTML = '<b>[FILE]</b> ' + name + ' (' + formatSize(f.size) + ') ' +
        '<a href="https://raw.githubusercontent.com/realproxik/linuxab/main/' + f.path + '" target="_blank">[RAW]</a> ' +
        '<a href="https://github.com/realproxik/linuxab/blob/main/' + f.path + '" target="_blank">[GITHUB]</a>';
    } else {
      li.dataset.path = fullPath.toLowerCase();
      li.dataset.name = name.toLowerCase();
      const header = document.createElement('span');
      header.innerHTML = '<b>[DIR]</b> ' + name + ' <button>[+]</button>';
      li.appendChild(header);

      const childContainer = document.createElement('div');
      childContainer.style.display = depth === 0 ? 'block' : 'none';
      childContainer.style.marginLeft = '20px';
      renderTree(child, childContainer, fullPath, depth + 1);
      li.appendChild(childContainer);

      header.querySelector('button').addEventListener('click', function() {
        const showing = childContainer.style.display === 'block';
        childContainer.style.display = showing ? 'none' : 'block';
        this.textContent = showing ? '[+]' : '[-]';
      });
    }
    ul.appendChild(li);
  });
  container.appendChild(ul);
}

const treeRoot = buildTree();
const container = document.getElementById('tree-root');
renderTree(treeRoot, container, '', 0);

let fileCount = 0, totalSize = 0;
files.forEach(f => { fileCount++; totalSize += f.size; });
function countDirs(node) {
  let c = 0;
  Object.keys(node).forEach(k => {
    if (k !== '__file') { c++; c += countDirs(node[k]); }
  });
  return c;
}
document.getElementById('file-count').textContent = fileCount;
document.getElementById('dir-count').textContent = countDirs(treeRoot);
document.getElementById('total-size').textContent = formatSize(totalSize);

const searchInput = document.getElementById('search');
const noResults = document.getElementById('no-results');

searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  const allItems = document.querySelectorAll('li');
  let hasMatch = false;

  if (!query) {
    allItems.forEach(item => item.style.display = '');
    noResults.style.display = 'none';
    document.querySelectorAll('div').forEach(d => {
      if (d.style.marginLeft === '20px') d.style.display = '';
    });
    return;
  }

  allItems.forEach(item => {
    const path = item.dataset.path || '';
    const name = item.dataset.name || '';
    const match = path.includes(query) || name.includes(query);
    if (match) {
      item.style.display = '';
      hasMatch = true;
      let parent = item.parentElement;
      while (parent) {
        if (parent.tagName === 'DIV') parent.style.display = 'block';
        parent = parent.parentElement;
      }
    } else {
      item.style.display = 'none';
    }
  });

  noResults.style.display = hasMatch ? 'none' : 'block';
});
