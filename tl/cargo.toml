
# First, let's set up the Rust WASM project structure
import os

project_dir = "/mnt/agents/output/bash-terminal"
os.makedirs(project_dir, exist_ok=True)
os.makedirs(f"{project_dir}/src", exist_ok=True)
os.makedirs(f"{project_dir}/pkg", exist_ok=True)

# Create Cargo.toml
cargo_toml = """[package]
name = "bash-terminal"
version = "0.1.0"
edition = "2021"
authors = ["Jatin <linuxab>"]
description = "WebAssembly Bash Terminal Emulator"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.87"
js-sys = "0.3.64"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
web-sys = { version = "0.3.64", features = [
    "console",
    "Document",
    "Element",
    "HtmlElement",
    "Window",
    "MouseEvent",
    "KeyboardEvent",
    "EventTarget",
    "DomRect",
    "CssStyleDeclaration",
    "HtmlCollection",
    "Node",
    "NodeList",
    "Text",
]}
console_error_panic_hook = "0.1.7"

[dependencies.web-sys]
version = "0.3.64"
features = [
    "console",
    "Document",
    "Element",
    "HtmlElement",
    "Window",
    "MouseEvent",
    "KeyboardEvent",
    "EventTarget",
    "DomRect",
    "CssStyleDeclaration",
    "HtmlCollection",
    "Node",
    "NodeList",
    "Text",
    "HtmlInputElement",
    "HtmlDivElement",
    "HtmlSpanElement",
    "Selection",
    "Range",
]

[profile.release]
opt-level = 3
lto = true
